<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment JSON Creator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Equipment JSON Creator</h1>

    <div class="card">

        <h2>Main Stats</h2>

        <div class="row">
            <label>ATK</label>
            <input type="number" id="mainATK" value="">
        </div>

        <div class="row">
            <label>HP</label>
            <input type="number" id="mainHP" value="">
        </div>

    </div>

    <div class="card">

        <h2>Sub Stats</h2>

        <div id="subStats"></div>

    </div>

    <button id="downloadBtn">
        Download JSON
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
