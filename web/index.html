<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Console Optimizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Console Optimizer</h1>

    <div class="tabs" id="tabs">
        <button class="tabBtn active" data-tab="character">Character</button>
        <button class="tabBtn" data-tab="cartridge">Cartridge</button>
        <button class="tabBtn" data-tab="module">Module</button>
    </div>

    <div class="card">
        <h2 id="panelTitle">Character</h2>

        <div id="emptyState" class="emptyState">
            <p>This tab is intentionally left blank for character setup.</p>
        </div>

        <div id="contentArea" class="hidden">
            <div class="card">
                <h2>Selected (max 20)</h2>
                <div id="selected" class="grid"></div>
            </div>

            <div class="card">
                <h2>Library</h2>
                <div id="library" class="library"></div>
            </div>
        </div>
    </div>

</div>
<!-- Floating Add Button -->
<button onclick="downloadJSON()" class="fab2">
    <img src="./assets/download_icon.svg"/>
</button>
<button id="openModalBtn" class="fab">+</button>

<!-- MODAL -->
<div id="modal" class="modal hidden">

    <div class="modalContent">

        <div class="modalHeader">
            <h2 id="modalTitle">Add / Import Item</h2>
            <button onclick="closeModal()">✖</button>
        </div>

        <div class="uploadBox">
            <input type="file" id="fileInput" accept=".json">
            <button onclick="importJSON()">Upload JSON</button>
        </div>

        <hr>

        <div class="card">
            <h3>Main Stats</h3>

            <div class="row">
                <label>ATK</label>
                <input type="number" id="mainATK">
            </div>

            <div class="row">
                <label>HP</label>
                <input type="number" id="mainHP">
            </div>
        </div>

        <div class="card">
            <h3>Sub Stats</h3>
            <div id="subStats"></div>
        </div>

        <div class="modalActions">
            <button onclick="clearForm()">Clear</button>
            <button onclick="addEquipment()">Save Item</button>
        </div>

    </div>
</div>
<script src="script.js"></script>
</body>
</html>
